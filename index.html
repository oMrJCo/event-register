<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ลงทะเบียนร่วมงาน (มัดจำ 1,000 บาท)</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:24px;max-width:720px}
    .card{border:1px solid #ddd;border-radius:14px;padding:16px;margin:12px 0}
    label{display:block;margin:10px 0 6px}
    input{width:100%;padding:12px;border:1px solid #ccc;border-radius:10px}
    button{padding:12px 16px;border:0;border-radius:12px;cursor:pointer}
    .muted{color:#666;font-size:14px}
    .hidden{display:none}
    .error{color:#b00020}
    .ok{color:#0b6b0b}
  </style>
</head>
<body>

<h2>ลงทะเบียนร่วมงาน (มัดจำ 1,000 บาท)</h2>
<p class="muted">กรอกข้อมูล → ยืนยัน → แสดง QR → แนบสลิป → ส่งข้อมูล</p>

<div class="card" id="step1">
  <h3>2) กรอกข้อมูลลงทะเบียน</h3>

  <label>ชื่อ-สกุล *</label>
  <input id="fullname" placeholder="เช่น สมชาย ใจดี" />

  <label>เบอร์โทร *</label>
  <input id="phone" inputmode="numeric" placeholder="เช่น 0999999999" />

  <label>ชื่อ Facebook *</label>
  <input id="facebook" placeholder="เช่น Somchai Jaidee" />

  <label>ID Line *</label>
  <input id="lineId" placeholder="เช่น somchai123" />

  <button id="btnConfirm" type="button" onclick="goStep2()">3) กดยืนยัน</button>
  <p id="msg1" class="error"></p>
</div>

<div class="card hidden" id="step2">
  <h3>4) โอนมัดจำ 1,000 บาท</h3>
  <p class="muted">สแกน QR เพื่อโอนเงิน แล้วกดไปแนบสลิป</p>

  <img src="qr-card.png" alt="QR Card" style="width:100%;max-width:420px;border-radius:14px;border:1px solid #eee" />

  <div style="margin-top:12px">
    <button id="btnNextUpload" type="button" onclick="goStep3()">ไปแนบสลิป</button>
  </div>
</div>

<div class="card hidden" id="step3">
  <h3>5) แนบสลิป</h3>
  <p class="muted">รองรับ JPG / PNG / PDF (ไม่เกิน 5MB)</p>

  <label>ไฟล์สลิป *</label>
  <input id="slip" type="file" accept="image/*,application/pdf" />

  <div style="margin-top:12px">
    <button id="btnSubmit" type="button" onclick="submitSlip()">ส่งข้อมูล + สลิป</button>
  </div>

  <p id="msg3"></p>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyGNTBkJZTVMLVP8qNZsEJ9qeHwf7zEybIeI2h1jTybvynHKAMjijaF6n5GkHI1oV3j/exec";
  const TOKEN = "SPX_EVENT_1000_2026_SECURE_9x7KpL2mQ8vR";

  function el(id){ return document.getElementById(id); }

  function goStep2(){
    el("msg1").textContent = "";

    const fullname = el("fullname").value.trim();
    const phone = el("phone").value.trim();
    const facebook = el("facebook").value.trim();
    const lineId = el("lineId").value.trim();

    if(!fullname || !phone || !facebook || !lineId){
      el("msg1").textContent = "กรุณากรอกข้อมูลให้ครบทุกช่อง";
      return;
    }

    el("step2").classList.remove("hidden");
    el("step2").scrollIntoView({behavior:"smooth"});
  }

  function goStep3(){
    el("step3").classList.remove("hidden");
    el("step3").scrollIntoView({behavior:"smooth"});
  }

  function submitSlip(){
    const btn = el("btnSubmit");
    const msg = el("msg3");
    msg.className = "";
    msg.textContent = "";

    const file = el("slip").files[0];
    if(!file){
      msg.textContent = "กรุณาแนบสลิป";
      msg.className = "error";
      return;
    }

    const MAX = 5 * 1024 * 1024;
    if(file.size > MAX){
      msg.textContent = "ไฟล์ใหญ่เกิน 5MB กรุณาย่อไฟล์แล้วลองใหม่";
      msg.className = "error";
      return;
    }

    btn.disabled = true;
    btn.style.opacity = "0.6";
    msg.textContent = "⏳ กำลังส่งข้อมูล... กรุณารอสักครู่";

    const reader = new FileReader();

    reader.onload = function(){
      const base64 = String(reader.result).split(",")[1];

      const form = document.createElement("form");
      form.method = "POST";
      form.action = WEB_APP_URL;
      form.target = "hidden_iframe";

      const fields = {
        token: TOKEN,
        fullname: el("fullname").value.trim(),
        phone: el("phone").value.trim(),
        facebook: el("facebook").value.trim(),
        lineId: el("lineId").value.trim(),
        deposit: 1000,
        fileName: file.name,
        mimeType: file.type || "application/octet-stream",
        fileDataBase64: base64
      };

      for(const key in fields){
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = String(fields[key]);
        form.appendChild(input);
      }

      document.body.appendChild(form);
      form.submit();
      document.body.removeChild(form);

      setTimeout(() => {
        msg.textContent = "✅ ส่งข้อมูลสำเร็จแล้ว! สถานะ: รอตรวจสอบ (ภายใน 24 ชม.)";
        msg.className = "ok";
        btn.disabled = false;
        btn.style.opacity = "1";
      }, 3000);
    };

    reader.onerror = function(){
      msg.textContent = "❌ อ่านไฟล์ไม่สำเร็จ กรุณาลองใหม่";
      msg.className = "error";
      btn.disabled = false;
      btn.style.opacity = "1";
    };

    reader.readAsDataURL(file);
  }
</script>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</body>
</html>
