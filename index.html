<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ลงทะเบียนร่วมงาน (มัดจำ ฿1,000)</title>
  <style>
    :root{
      --bg:#FFFDF7;--card:#ffffff;--text:#1F2937;--muted:#6B7280;--border:#E5E7EB;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --yellow:#F7C948;--yellow-soft:#FFF4CC;--radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:820px;margin:0 auto;padding:18px 14px 40px}
    .topbar{position:sticky;top:0;z-index:5;background:rgba(255,253,247,.88);backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(229,231,235,.65)}
    .topbar-inner{max-width:820px;margin:0 auto;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .logo{width:34px;height:34px;border-radius:12px;background:linear-gradient(145deg,var(--yellow),#FFE9A3);
      display:grid;place-items:center;box-shadow:0 8px 18px rgba(247,201,72,.35);flex:0 0 auto;color:#111827;font-weight:900}
    .brand-title{display:flex;flex-direction:column;min-width:0}
    .brand-title b{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand-title span{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badge{font-size:12px;padding:8px 10px;border-radius:999px;background:var(--yellow-soft);
      border:1px solid rgba(234,179,8,.25);color:#92400E;font-weight:700}
    .hero{margin:14px 0 10px;padding:14px;border-radius:var(--radius);
      background:linear-gradient(180deg,rgba(247,201,72,.22),rgba(255,244,204,.45));
      border:1px solid rgba(234,179,8,.18)}
    .hero h1{margin:0 0 6px;font-size:18px}
    .hero p{margin:0;font-size:13px;color:var(--muted)}
    .grid{display:grid;gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .card-head{padding:14px 14px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
      border-bottom:1px solid rgba(229,231,235,.7);
      background:linear-gradient(180deg,rgba(255,244,204,.45),rgba(255,255,255,.75))}
    .card-title{margin:0;font-size:15px;font-weight:900}
    .card-sub{margin:4px 0 0;font-size:12px;color:var(--muted)}
    .step{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:#92400E;padding:8px 10px;border-radius:999px;background:rgba(247,201,72,.25);border:1px solid rgba(234,179,8,.18)}
    .card-body{padding:14px}
    .field{margin:10px 0}
    label{display:block;font-size:12px;color:#374151;margin:0 0 6px;font-weight:800}
    .req{color:#B45309;font-weight:900}
    input{width:100%;padding:12px;border:1px solid var(--border);border-radius:14px;font-size:15px;outline:none;background:#fff}
    input:focus{border-color:rgba(234,179,8,.55);box-shadow:0 0 0 4px rgba(247,201,72,.25)}
    .help{margin-top:6px;font-size:12px;color:var(--muted)}
    .btnrow{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    button{border:0;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:900;cursor:pointer;width:100%}
    .btn-primary{background:linear-gradient(180deg,var(--yellow),#FFE08A);color:#111827;box-shadow:0 10px 18px rgba(247,201,72,.28)}
    .btn-secondary{background:#fff;color:#92400E;border:1px solid rgba(234,179,8,.45)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(229,231,235,.9)}
    .hidden{display:none!important}
    .msg{margin-top:10px;font-size:13px;font-weight:800}
    .msg.error{color:#B00020}
    .msg.ok{color:#0B6B0B}
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo">✓</div>
        <div class="brand-title">
          <b>ลงทะเบียนร่วมงาน</b>
          <span>กรอกข้อมูล • โอน • แนบสลิป</span>
        </div>
      </div>
      <div class="badge">มัดจำ ฿1,000</div>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <h1>ลงทะเบียนเพื่อบันทึกรายชื่อ</h1>
      <p>กรอกข้อมูล → โอนมัดจำ → แนบสลิป → ส่ง ระบบบันทึกอัตโนมัติ</p>
    </div>

    <div class="grid">

      <section class="card" id="step4">
        <div class="card-head">
          <div>
            <h3 class="card-title">4) ตรวจสอบสถานะการลงทะเบียน</h3>
            <p class="card-sub">ใส่เบอร์โทรที่ลงทะเบียนไว้ ระบบจะแสดงสถานะล่าสุด</p>
          </div>
          <div class="step">STATUS</div>
        </div>

        <div class="card-body">
          <div class="field">
            <label>เบอร์โทรที่ใช้ลงทะเบียน <span class="req">*</span></label>
            <input id="checkPhone" inputmode="numeric" placeholder="เช่น 09xxxxxxxx" />
            <div class="help">กรอกเบอร์ให้ตรงกับที่ลงทะเบียน</div>
          </div>

          <div class="btnrow">
            <button class="btn-primary" type="button" onclick="checkStatus()">ตรวจสอบสถานะ</button>
          </div>

          <div style="margin-top:12px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:#fff">
            <iframe id="statusFrame" title="Status Result" style="width:100%;height:160px;border:0"></iframe>
          </div>
        </div>
      </section>

    </div>
  </div>

<script>
  // ✅ เปลี่ยน 2 ตัวนี้ให้ตรงของพี่
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyGNTBkJZTVMLVP8qNZsEJ9qeHwf7zEybIeI2h1jTybvynHKAMjijaF6n5GkHI1oV3j/exec";
  const TOKEN = "SPX_EVENT_1000_2026_SECURE_9x7KpL2mQ8vR";

  function checkStatus(){
    const phone = (document.getElementById("checkPhone").value || "").trim();
    if(!phone){ alert("กรุณาใส่เบอร์โทร"); return; }

    const url = WEB_APP_URL.replace(/\/exec$/, "/exec/status")
      + "?token=" + encodeURIComponent(TOKEN)
      + "&phone=" + encodeURIComponent(phone)
      + "&t=" + Date.now(); // ✅ กัน cache

    document.getElementById("statusFrame").src = url;
  }

  // ✅ Auto-resize iframe จาก postMessage ที่ Code.gs ส่งมา
  window.addEventListener("message", (event) => {
    const data = event.data || {};
    if (data.type !== "SPX_IFRAME_HEIGHT") return;

    const h = Number(data.height || 0);
    if (!h) return;

    const frame = document.getElementById("statusFrame");
    if (!frame) return;

    const minH = 160;
    const maxH = 700;
    const finalH = Math.max(minH, Math.min(maxH, h + 14));
    frame.style.height = finalH + "px";
  });
</script>

</body>
</html>
